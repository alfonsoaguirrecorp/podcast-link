<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estadísticas — Algo Más Que Contarte</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
    }

    /* Summary cards */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px 18px;
    }

    .summary-card .label {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .summary-card .value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
    }

    .summary-card .note {
      font-size: 0.72rem;
      color: #666;
      margin-top: 4px;
    }

    /* Trend mini chart */
    .trend-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 36px;
      margin-top: 10px;
    }
    .trend-bar {
      flex: 1;
      background: #333;
      border-radius: 2px;
      min-height: 3px;
      transition: background 0.2s;
    }
    .trend-bar.recent { background: #4ade80; }

    .trend-change {
      font-size: 0.8rem;
      font-weight: 700;
      margin-top: 4px;
    }
    .trend-change.up   { color: #4ade80; }
    .trend-change.down { color: #f87171; }
    .trend-change.flat { color: #888; }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      background: #1a1a1a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      color: #888;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2a2a2a;
      white-space: nowrap;
    }

    thead th.num { text-align: right; }

    tbody tr {
      border-bottom: 1px solid #222;
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #222; }

    td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #ccc;
    }

    .ep-title {
      font-weight: 500;
      color: #fff;
      max-width: 280px;
    }

    .ep-date {
      color: #666;
      font-size: 0.78rem;
      margin-top: 2px;
    }

    /* Traffic light badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.green  { background: #1a3d1f; color: #4ade80; }
    .badge.yellow { background: #3d3200; color: #facc15; }
    .badge.red    { background: #3d1a1a; color: #f87171; }
    .badge.gray   { background: #2a2a2a; color: #888; }

    .action-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .action-tag.green  { background: #1a3d1f; color: #4ade80; }
    .action-tag.yellow { background: #2a2a2a; color: #aaa; }
    .action-tag.red    { background: #3d1a1a; color: #f87171; }
    .action-tag.gray   { background: #222; color: #666; font-weight: 400; font-style: italic; }

    .source-tag {
      display: inline-block;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 3px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .source-op3    { background: #0d2a1a; color: #4ade80; }
    .source-libsyn { background: #1e2030; color: #818cf8; }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .green .dot  { background: #4ade80; }
    .yellow .dot { background: #facc15; }
    .red .dot    { background: #f87171; }
    .gray .dot   { background: #888; }

    /* Pending indicator */
    .pending {
      color: #555;
      font-size: 0.78rem;
      font-style: italic;
    }

    /* Loading skeleton */
    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, #222 25%, #2a2a2a 50%, #222 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      margin: 4px 0;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-msg {
      background: #3d1a1a;
      color: #f87171;
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .no-data {
      padding: 40px 20px;
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-size: 0.75rem;
      color: #888;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Estadísticas del podcast</h1>
    <p class="subtitle" id="data-range">Cargando datos…</p>

    <div class="summary-row" id="summary-row">
      <div class="summary-card" id="trend-card">
        <div class="label">Descargas totales del podcast</div>
        <div class="value skeleton-line" style="width:80px;height:28px"></div>
        <div class="skeleton-line" style="width:100%;height:36px;margin-top:10px"></div>
      </div>
      <div class="summary-card"><div class="label">Promedio primera semana</div><div class="value skeleton-line" style="width:60px;height:28px"></div></div>
      <div class="summary-card"><div class="label">Episodio top (7 días)</div><div class="value skeleton-line" style="width:60px;height:28px"></div></div>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#4ade80"></span>+20% sobre el promedio</span>
      <span class="legend-item"><span class="legend-dot" style="background:#facc15"></span>±20% del promedio</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f87171"></span>-20% bajo el promedio</span>
      <span class="legend-item"><span class="legend-dot" style="background:#888"></span>Datos incompletos</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Episodio</th>
            <th class="num">1 día</th>
            <th class="num">3 días</th>
            <th class="num">7 días</th>
            <th class="num">30 días</th>
            <th class="num">Total</th>
            <th>vs. promedio</th>
            <th>estado</th>
          </tr>
        </thead>
        <tbody id="stats-body">
          <!-- populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function fmt(n) {
      if (n == null) return '—';
      return n.toLocaleString('es-MX');
    }

    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function badge(ep, avg7) {
      let val = ep.downloads7;
      let projected = false;

      // Si no hay datos de 7 días pero el episodio tiene menos de 7 días,
      // proyectar linealmente con el total actual
      if ((val == null || val === 0) && ep.downloadsAll != null && ep.daysOld != null && ep.daysOld >= 1 && ep.daysOld < 7) {
        val = Math.round(ep.downloadsAll / ep.daysOld * 7);
        projected = true;
      }

      if (val == null || val === 0 || avg7 == null) {
        return `<span class="badge gray"><span class="dot"></span>Sin datos</span>`;
      }

      const pct  = (val - avg7) / avg7;
      const sign = pct >= 0 ? '+' : '';
      const tag  = projected ? ' <small style="opacity:.7;font-size:.65rem">proy.</small>' : '';

      if (pct >= 0.2)  return `<span class="badge green"><span class="dot"></span>${sign}${Math.round(pct*100)}%${tag}</span>`;
      if (pct >= -0.2) return `<span class="badge yellow"><span class="dot"></span>${sign}${Math.round(pct*100)}%${tag}</span>`;
      return `<span class="badge red"><span class="dot"></span>${sign}${Math.round(pct*100)}%${tag}</span>`;
    }

    function fmtD7(ep) {
      if (ep.downloads7 != null && ep.downloads7 > 0) return fmt(ep.downloads7);
      if (ep.downloadsAll != null && ep.daysOld != null && ep.daysOld >= 1 && ep.daysOld < 7) {
        return `${fmt(ep.downloadsAll)} <small style="color:#666;font-size:.75rem">día&nbsp;${ep.daysOld}</small>`;
      }
      return '—';
    }

    function actionTag(ep, avg7) {
      let val = ep.downloads7;
      let projected = false;

      if ((val == null || val === 0) && ep.downloadsAll != null && ep.daysOld >= 1 && ep.daysOld < 7) {
        val = Math.round(ep.downloadsAll / ep.daysOld * 7);
        projected = true;
      }

      if (val == null || val === 0 || avg7 == null) {
        return `<span class="action-tag gray">Sin datos aún</span>`;
      }

      const pct  = (val - avg7) / avg7;
      const note = projected ? ' <small style="opacity:.6;font-size:.65rem">proy.</small>' : '';

      if (pct >= 0.2)  return `<span class="action-tag green">Creciendo más que el promedio${note}</span>`;
      if (pct >= -0.2) return `<span class="action-tag yellow">Promedio alcanzado${note}</span>`;
      return `<span class="action-tag red">Necesita promoción${note}</span>`;
    }

    async function load() {
      try {
        const res  = await fetch('/api/stats');
        const data = await res.json();

        if (data.error) {
          document.getElementById('data-range').textContent = '';
          document.getElementById('stats-body').innerHTML =
            `<tr><td colspan="7"><div class="error-msg">${data.error}</div></td></tr>`;
          document.getElementById('summary-row').innerHTML = '';
          return;
        }

        if (!data.episodes || data.episodes.length === 0) {
          document.getElementById('data-range').textContent = '';
          document.getElementById('stats-body').innerHTML =
            `<tr><td colspan="7"><div class="no-data">Aún no hay datos suficientes.<br>Los episodios con el prefijo OP3 comenzarán a acumular estadísticas en los próximos días.</div></td></tr>`;
          document.getElementById('summary-row').innerHTML = '';
          return;
        }

        const eps = data.episodes;

        // Promedio global (para las tarjetas de resumen)
        const withWeek = eps.filter(e => e.downloads7 != null && e.downloads7 > 0);
        const avg7Global = withWeek.length
          ? Math.round(withWeek.reduce((s, e) => s + e.downloads7, 0) / withWeek.length)
          : null;
        const topEp = withWeek.length
          ? withWeek.reduce((a, b) => b.downloads7 > a.downloads7 ? b : a)
          : null;

        // Promedio rolling: cada episodio se compara solo contra
        // los episodios publicados ANTES que él (no los futuros).
        // Ordenar de más antiguo a más nuevo para acumular.
        const byDate = [...eps]
          .filter(e => e.pubdate)
          .sort((a, b) => new Date(a.pubdate) - new Date(b.pubdate));

        let runSum = 0, runCount = 0;
        for (const ep of byDate) {
          // avgAtTime = promedio de todos los episodios anteriores a este
          ep.avgAtTime = runCount >= 3
            ? Math.round(runSum / runCount)
            : null; // sin referencia si hay menos de 3 episodios previos

          // Agregar este episodio al acumulado para el siguiente
          if (ep.downloads7 != null && ep.downloads7 > 0) {
            runSum  += ep.downloads7;
            runCount++;
          }
        }

        // Update subtitle
        document.getElementById('data-range').textContent =
          `Datos desde OP3 · Actualizado diariamente · Semáforo vs. promedio histórico al momento de publicación`;

        // Update summary cards
        document.getElementById('summary-row').innerHTML = `
          <div class="summary-card">
            <div class="label">Episodios con datos</div>
            <div class="value">${withWeek.length}</div>
            <div class="note">${eps.length} episodios en total</div>
          </div>
          <div class="summary-card">
            <div class="label">Promedio actual (7 días)</div>
            <div class="value">${avg7Global != null ? fmt(avg7Global) : '—'}</div>
            <div class="note">histórico completo</div>
          </div>
          <div class="summary-card">
            <div class="label">Top episodio (7 días)</div>
            <div class="value">${topEp ? fmt(topEp.downloads7) : '—'}</div>
            <div class="note">${topEp ? (topEp.title.length > 30 ? topEp.title.slice(0,30)+'…' : topEp.title) : ''}</div>
          </div>
        `;

        // Render rows — eps ya viene ordenado de más nuevo a más viejo (del servidor)
        const rows = eps.map(ep => `
          <tr>
            <td>
              <div class="ep-title">${ep.title || 'Sin título'}</div>
              <div class="ep-date">${formatDate(ep.pubdate)}</div>
              <span class="source-tag ${ep.source === 'op3' ? 'source-op3' : 'source-libsyn'}">${ep.source === 'op3' ? 'OP3' : 'Libsyn'}</span>
            </td>
            <td class="num">${fmt(ep.downloads1)}</td>
            <td class="num">${fmt(ep.downloads3)}</td>
            <td class="num">${fmtD7(ep)}</td>
            <td class="num">${fmt(ep.downloads30)}</td>
            <td class="num">${fmt(ep.downloadsAll)}</td>
            <td>${badge(ep, ep.avgAtTime)}</td>
            <td>${actionTag(ep, ep.avgAtTime)}</td>
          </tr>
        `).join('');

        document.getElementById('stats-body').innerHTML = rows;

      } catch (err) {
        console.error(err);
        document.getElementById('data-range').textContent = '';
        document.getElementById('stats-body').innerHTML =
          `<tr><td colspan="7"><div class="error-msg">Error al cargar estadísticas. Verifica que el servidor esté corriendo correctamente.</div></td></tr>`;
        document.getElementById('summary-row').innerHTML = '';
      }
    }

    async function loadTrend() {
      try {
        const res  = await fetch('/api/trend');
        const data = await res.json();
        const card = document.getElementById('trend-card');
        if (!card) return;

        if (data.error || !data.days) {
          card.innerHTML = `<div class="label">Descargas totales del podcast</div><div class="note" style="color:#555;margin-top:8px">Sin datos aún — se acumula desde que se activó OP3</div>`;
          return;
        }

        const { days, last7, prev7 } = data;
        const maxVal = Math.max(...days.map(d => d.downloads), 1);
        const pct    = prev7 > 0 ? Math.round((last7 - prev7) / prev7 * 100) : null;
        const arrow  = pct == null ? '' : pct > 0 ? '↑' : pct < 0 ? '↓' : '→';
        const cls    = pct == null ? 'flat' : pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
        const label  = pct == null ? 'primeros datos acumulándose' : `${arrow} ${Math.abs(pct)}% vs semana anterior`;

        const bars = days.map((d, i) => {
          const h       = Math.max(3, Math.round((d.downloads / maxVal) * 36));
          const recent  = i >= 7 ? 'recent' : '';
          const title   = `${d.date}: ${d.downloads.toLocaleString('es-MX')}`;
          return `<div class="trend-bar ${recent}" style="height:${h}px" title="${title}"></div>`;
        }).join('');

        card.innerHTML = `
          <div class="label">Descargas totales del podcast</div>
          <div class="value">${last7.toLocaleString('es-MX')}</div>
          <div class="trend-change ${cls}">${label}</div>
          <div class="trend-bars">${bars}</div>
          <div class="note" style="margin-top:6px">últimos 7 días · barras verdes = esta semana</div>
        `;
      } catch (e) {
        console.error('Trend error:', e);
      }
    }

    load();
    loadTrend();
  </script>
</body>
</html>
