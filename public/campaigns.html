<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campañas — Algo Más Que Contarte</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    .page { max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }

    /* ── Header ── */
    .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
    h1 { font-size: 1.4rem; font-weight: 700; flex: 1; }
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 10px; font-size: .85rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; font-family: inherit; }
    .btn:hover { opacity: .82; }
    .btn-primary { background: #fff; color: #000; }
    .btn-ghost   { background: #1a1a1a; color: #ccc; border: 1px solid #333; }
    .btn-danger  { background: #3d1a1a; color: #f87171; border: 1px solid #5a2020; }
    .btn-sm { padding: 6px 13px; font-size: .78rem; }

    /* ── Campaign selector ── */
    .campaign-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
    .campaign-select { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: .9rem; padding: 9px 14px; font-family: inherit; outline: none; cursor: pointer; flex: 1; min-width: 200px; }
    .campaign-select:focus { border-color: #555; }
    .campaign-select option { background: #1a1a1a; }

    /* ── Summary cards ── */
    .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 16px 18px; }
    .card .label { font-size: .72rem; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .card .value { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .card .note  { font-size: .72rem; color: #666; margin-top: 4px; }
    .card.accent { border: 1px solid #2a3a2a; }
    .card.accent .value { color: #4ade80; }

    /* ── Opt-ins chart ── */
    .chart-section { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 28px; }
    .section-title { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #888; margin-bottom: 16px; }
    .chart-wrap { display: flex; align-items: flex-end; gap: 4px; height: 80px; overflow-x: auto; padding-bottom: 4px; }
    .chart-bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 28px; }
    .chart-bar { width: 100%; background: #4ade80; border-radius: 3px 3px 0 0; min-height: 2px; transition: opacity .15s; cursor: default; }
    .chart-bar:hover { opacity: .75; }
    .chart-label { font-size: .58rem; color: #555; white-space: nowrap; transform: rotate(-45deg); transform-origin: top center; margin-top: 4px; }
    .chart-empty { color: #555; font-size: .85rem; font-style: italic; padding: 20px 0; }

    /* ── Episodes table ── */
    .table-section { margin-bottom: 28px; }
    .table-wrap { overflow-x: auto; border-radius: 12px; background: #1a1a1a; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead th { padding: 12px 16px; text-align: left; color: #888; font-weight: 600; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #2a2a2a; white-space: nowrap; }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid #222; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #222; }
    td { padding: 12px 16px; vertical-align: middle; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; color: #ccc; }
    .ep-title { font-weight: 500; color: #fff; max-width: 280px; }
    .ep-date  { color: #666; font-size: .78rem; margin-top: 2px; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; white-space: nowrap; }
    .badge.green  { background: #1a3d1f; color: #4ade80; }
    .badge.yellow { background: #3d3200; color: #facc15; }
    .badge.red    { background: #3d1a1a; color: #f87171; }
    .badge.gray   { background: #2a2a2a; color: #888; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .green .dot { background: #4ade80; } .yellow .dot { background: #facc15; }
    .red .dot   { background: #f87171; } .gray .dot   { background: #888; }

    /* ── Empty / loading ── */
    .empty { padding: 60px 20px; text-align: center; color: #555; font-size: .9rem; line-height: 1.7; }
    .skeleton { height: 14px; background: linear-gradient(90deg,#222 25%,#2a2a2a 50%,#222 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .error-msg { background: #3d1a1a; color: #f87171; padding: 14px 18px; border-radius: 10px; font-size: .85rem; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
    .modal-overlay.hidden { display: none; }
    .modal { background: #1a1a1a; border-radius: 16px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative; border: 1px solid #2a2a2a; }
    .modal h2 { font-size: 1.1rem; margin-bottom: 20px; }
    .modal-close { position: absolute; top: 14px; right: 14px; background: #222; border: none; color: #888; width: 28px; height: 28px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { color: #fff; background: #333; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: .75rem; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 7px; }
    .form-row input, .form-row select { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: .9rem; padding: 10px 13px; font-family: inherit; outline: none; }
    .form-row input:focus, .form-row select:focus { border-color: #555; }
    .form-row select option { background: #1a1a1a; }
    .ep-checkboxes { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px 13px; }
    .ep-checkbox-item { display: flex; align-items: center; gap: 9px; font-size: .85rem; color: #ccc; cursor: pointer; padding: 4px 0; }
    .ep-checkbox-item:hover { color: #fff; }
    .ep-checkbox-item input[type=checkbox] { width: 15px; height: 15px; accent-color: #4ade80; flex-shrink: 0; cursor: pointer; }
    .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .nav-links { font-size: .8rem; color: #555; margin-bottom: 8px; }
    .nav-links a { color: #888; text-decoration: none; } .nav-links a:hover { color: #fff; }
  </style>
</head>
<body>
<div class="page">
  <p class="nav-links"><a href="/stats">← Estadísticas del podcast</a></p>

  <div class="top-bar">
    <h1>Campañas</h1>
    <button class="btn btn-ghost btn-sm" onclick="openModal()">+ Nueva campaña</button>
  </div>

  <!-- Campaign selector -->
  <div class="campaign-bar" id="campaign-bar" style="display:none">
    <select class="campaign-select" id="campaign-select" onchange="selectCampaign(this.value)">
      <option value="">— Selecciona una campaña —</option>
    </select>
    <button class="btn btn-ghost btn-sm" id="edit-btn" style="display:none" onclick="openEditModal()">Editar</button>
    <button class="btn btn-danger btn-sm" id="delete-btn" style="display:none" onclick="deleteCampaign()">Eliminar</button>
  </div>

  <!-- Stats area -->
  <div id="stats-area">
    <div class="empty" id="empty-msg">
      No hay campañas todavía.<br>
      <span style="color:#444;font-size:.82rem">Crea tu primera campaña con el botón de arriba.</span>
    </div>
  </div>
</div>

<!-- Modal crear/editar campaña -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modal-title">Nueva campaña</h2>

    <div class="form-row">
      <label>Nombre de la campaña</label>
      <input type="text" id="f-name" placeholder="Ej. MP360 2026" />
    </div>

    <div class="form-row">
      <label>Etiqueta de Kajabi (tag de leads)</label>
      <select id="f-tag">
        <option value="">Cargando tags…</option>
      </select>
    </div>

    <div class="form-row">
      <label>Formulario de Kajabi (para gráfica de opt-ins) <span style="color:#555">— opcional</span></label>
      <select id="f-form">
        <option value="">Cargando formularios…</option>
      </select>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-row" style="margin:0">
        <label>Meta de leads</label>
        <input type="number" id="f-goal" placeholder="Ej. 500" min="0" />
      </div>
      <div class="form-row" style="margin:0">
        <label>Fecha de cierre</label>
        <input type="date" id="f-enddate" />
      </div>
    </div>

    <div class="form-row">
      <label>Episodios de esta campaña</label>
      <div class="ep-checkboxes" id="ep-checkboxes">
        <span style="color:#555;font-size:.82rem">Cargando episodios…</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCampaign()">Guardar</button>
    </div>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────────
  let campaigns    = [];
  let currentId    = null;
  let editingId    = null;
  let allTags      = [];
  let allForms     = [];
  let allEpisodes  = [];  // from /api/stats

  // ── Format helpers ───────────────────────────────────────────────────────────
  const fmt = n => n == null ? '—' : n.toLocaleString('es-MX');
  const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('es-MX', { day:'numeric', month:'short', year:'numeric' }) : '';
  const fmtShort = iso => iso ? iso.slice(5, 10) : ''; // MM-DD

  // ── Rolling average helpers (same as stats.html) ─────────────────────────────
  function computeRollingAvgs(eps) {
    const byDate = [...eps].filter(e => e.pubdate).sort((a, b) => new Date(a.pubdate) - new Date(b.pubdate));
    let runSum = 0, runCount = 0, runSumD1 = 0, runCountD1 = 0, runSumD3 = 0, runCountD3 = 0;
    for (const ep of byDate) {
      ep.avgAtTime   = runCount   >= 3 ? Math.round(runSum   / runCount)   : null;
      ep.avgAtTimeD1 = runCountD1 >= 2 ? Math.round(runSumD1 / runCountD1) : null;
      ep.avgAtTimeD3 = runCountD3 >= 2 ? Math.round(runSumD3 / runCountD3) : null;
      if (ep.downloads7  > 0) { runSum   += ep.downloads7;  runCount++;   }
      if (ep.downloads1  > 0) { runSumD1 += ep.downloads1;  runCountD1++; }
      if (ep.downloads3  > 0) { runSumD3 += ep.downloads3;  runCountD3++; }
    }
  }

  function getMetric(ep) {
    const d = ep.daysOld;
    if (d == null) return { val: null, avg: null };
    if (d >= 7 && ep.downloads7 > 0 && ep.avgAtTime != null)   return { val: ep.downloads7,  avg: ep.avgAtTime,   label: '7d' };
    if (d >= 3 && ep.downloads3 > 0 && ep.avgAtTimeD3 != null) return { val: ep.downloads3,  avg: ep.avgAtTimeD3, label: '3d' };
    if (d >= 1 && ep.downloads1 > 0 && ep.avgAtTimeD1 != null) return { val: ep.downloads1,  avg: ep.avgAtTimeD1, label: '1d' };
    // Proyección con curva de decaimiento (NO lineal):
    // los podcasts son front-loaded, ~75% de las descargas de 7 días llegan en los primeros 2 días.
    if (ep.downloadsAll > 0 && ep.avgAtTime != null && d >= 1 && d < 7) {
      const decayCumulative = [0, 0.62, 0.75, 0.84, 0.90, 0.94, 0.97];
      const factor = decayCumulative[Math.min(d, 6)];
      return { val: Math.round(ep.downloadsAll / factor), avg: ep.avgAtTime, label: 'proy.', projected: true };
    }
    if (d >= 7 && ep.downloadsAll > 0 && ep.avgAtTime != null) return { val: ep.downloadsAll, avg: ep.avgAtTime, label: 'total' };
    return { val: null, avg: null };
  }

  function badge(ep) {
    const { val, avg, label } = getMetric(ep);
    if (!val || !avg) return `<span class="badge gray"><span class="dot"></span>Sin datos</span>`;
    const pct = (val - avg) / avg, sign = pct >= 0 ? '+' : '';
    const tag = `<small style="opacity:.6;font-size:.65rem;margin-left:2px">${label}</small>`;
    if (pct >= 0.2)  return `<span class="badge green"><span class="dot"></span>${sign}${Math.round(pct*100)}%${tag}</span>`;
    if (pct >= -0.2) return `<span class="badge yellow"><span class="dot"></span>${sign}${Math.round(pct*100)}%${tag}</span>`;
    return `<span class="badge red"><span class="dot"></span>${sign}${Math.round(pct*100)}%${tag}</span>`;
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  async function init() {
    const [cRes, tRes, fRes, sRes] = await Promise.all([
      fetch('/api/campaigns').then(r => r.json()).catch(() => ({ campaigns: [] })),
      fetch('/api/kajabi/tags').then(r => r.json()).catch(() => ({ tags: [] })),
      fetch('/api/kajabi/forms').then(r => r.json()).catch(() => ({ forms: [] })),
      fetch('/api/stats').then(r => r.json()).catch(() => ({ episodes: [] }))
    ]);

    campaigns   = cRes.campaigns   || [];
    allTags     = tRes.tags        || [];
    allForms    = fRes.forms       || [];
    allEpisodes = sRes.episodes    || [];

    renderCampaignSelector();

    if (campaigns.length > 0) {
      document.getElementById('campaign-bar').style.display = 'flex';
      document.getElementById('empty-msg')?.remove();
      // Auto-select the first campaign
      selectCampaign(campaigns[0].id);
    }
  }

  function renderCampaignSelector() {
    const sel = document.getElementById('campaign-select');
    sel.innerHTML = '<option value="">— Selecciona una campaña —</option>' +
      campaigns.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    if (currentId) sel.value = currentId;
  }

  // ── Select a campaign ─────────────────────────────────────────────────────────
  async function selectCampaign(id) {
    currentId = id;
    document.getElementById('campaign-select').value = id;
    document.getElementById('edit-btn').style.display   = id ? '' : 'none';
    document.getElementById('delete-btn').style.display = id ? '' : 'none';

    if (!id) {
      document.getElementById('stats-area').innerHTML =
        `<div class="empty">Selecciona una campaña para ver sus estadísticas.</div>`;
      return;
    }

    document.getElementById('stats-area').innerHTML =
      `<div class="empty"><span class="skeleton" style="width:200px;height:16px;display:inline-block"></span></div>`;

    try {
      // Carga episodios + opt-ins primero (rápido)
      const data = await fetch(`/api/campaigns/${id}/stats`).then(r => r.json());
      renderStats(data);

      // Carga leads por separado (puede tardar — pagina contactos de Kajabi)
      if (data.campaign?.kajabiTagId) {
        loadLeads(id, data.campaign);
      }
    } catch (e) {
      document.getElementById('stats-area').innerHTML =
        `<div class="error-msg">Error al cargar estadísticas: ${e.message}</div>`;
    }
  }

  // Carga los leads de Kajabi de forma independiente y actualiza las tarjetas
  async function loadLeads(id, campaign) {
    try {
      const data = await fetch(`/api/campaigns/${id}/leads`).then(r => r.json());
      const container = document.getElementById('leads-cards');
      if (!container) return;

      if (data.leadsError) {
        container.innerHTML =
          `<div class="card"><div class="label">Leads campaña</div><div class="note" style="color:#f87171">${data.leadsError}</div></div>`;
        return;
      }

      // Actualizar gráfica con los datos de opt-ins por día
      if (data.optinsByDay) {
        const chartContainer = document.getElementById('optins-chart-container');
        if (chartContainer) {
          chartContainer.innerHTML = renderChart(data.optinsByDay, data.optinsTotal, null, campaign);
        }
      }

      if (data.leads) {
        const total = data.leads.total;
        const goal  = campaign.leadsGoal;

        // Tarjeta 1: Total actual
        const totalCard = `
          <div class="card accent">
            <div class="label">Total leads</div>
            <div class="value">${fmt(total)}</div>
            <div class="note">con etiqueta "${campaign.kajabiTagName}"</div>
          </div>`;

        // Tarjeta 2: Leads para la meta
        let goalCard = '';
        if (goal != null) {
          const remaining = goal - total;
          if (remaining <= 0) {
            goalCard = `
              <div class="card" style="border:1px solid #2a3a2a">
                <div class="label">Leads para la meta</div>
                <div class="value" style="color:#4ade80">¡Meta!</div>
                <div class="note">${fmt(Math.abs(remaining))} sobre la meta de ${fmt(goal)}</div>
              </div>`;
          } else {
            goalCard = `
              <div class="card">
                <div class="label">Leads para la meta</div>
                <div class="value">${fmt(remaining)}</div>
                <div class="note">meta: ${fmt(goal)} leads</div>
              </div>`;
          }
        }

        // Tarjeta 3: Necesarios por día
        let perDayCard = '';
        if (goal != null && campaign.endDate) {
          const remaining  = Math.max(0, goal - total);
          const today      = new Date(); today.setHours(0, 0, 0, 0);
          const end        = new Date(campaign.endDate + 'T00:00:00');
          const daysLeft   = Math.ceil((end - today) / 86400000);

          if (daysLeft <= 0) {
            perDayCard = `
              <div class="card">
                <div class="label">Necesarios por día</div>
                <div class="value" style="color:#888">—</div>
                <div class="note">campaña finalizada</div>
              </div>`;
          } else if (remaining <= 0) {
            perDayCard = `
              <div class="card">
                <div class="label">Días restantes</div>
                <div class="value">${fmt(daysLeft)}</div>
                <div class="note">hasta el ${new Date(campaign.endDate + 'T00:00:00').toLocaleDateString('es-MX', { day:'numeric', month:'short' })}</div>
              </div>`;
          } else {
            const perDay = Math.ceil(remaining / daysLeft);
            perDayCard = `
              <div class="card">
                <div class="label">Necesarios por día</div>
                <div class="value">${fmt(perDay)}</div>
                <div class="note">${fmt(daysLeft)} días restantes</div>
              </div>`;
          }
        }

        container.innerHTML = totalCard + goalCard + perDayCard;
      }
    } catch (e) {
      const container = document.getElementById('leads-cards');
      if (container) container.innerHTML =
        `<div class="card"><div class="label">Leads campaña</div><div class="note" style="color:#f87171">Error: ${e.message}</div></div>`;
    }
  }

  // ── Render stats ──────────────────────────────────────────────────────────────
  function renderStats(data) {
    const { campaign, optinsByDay, optinsTotal, optinsError, episodes = [] } = data;

    // Compute rolling avgs using ALL podcast episodes as context
    computeRollingAvgs(allEpisodes);
    // Attach avgs to the campaign episodes
    for (const cEp of episodes) {
      const full = allEpisodes.find(e => e.title === cEp.title);
      if (full) { cEp.avgAtTime = full.avgAtTime; cEp.avgAtTimeD1 = full.avgAtTimeD1; cEp.avgAtTimeD3 = full.avgAtTimeD3; }
    }

    // ── Summary cards ──────────────────────────────────────────────────────────
    const totalDownloads = episodes.reduce((s, e) => s + (e.downloadsAll || 0), 0);
    const avgD7 = episodes.filter(e => e.downloads7 > 0);
    const avgD7val = avgD7.length ? Math.round(avgD7.reduce((s,e) => s + e.downloads7, 0) / avgD7.length) : null;

    // Placeholder de leads mientras carga (skeleton animado)
    const leadsPlaceholder = campaign.kajabiTagId ? `
      <div class="card accent">
        <div class="label">Total leads</div>
        <div class="value skeleton" style="width:60px;height:28px;margin:2px 0"></div>
        <div class="note" style="color:#555">Cargando…</div>
      </div>
      ${campaign.leadsGoal != null ? `<div class="card"><div class="label">Leads para la meta</div><div class="value skeleton" style="width:50px;height:28px;margin:2px 0"></div></div>` : ''}
      ${campaign.leadsGoal != null && campaign.endDate ? `<div class="card"><div class="label">Necesarios por día</div><div class="value skeleton" style="width:40px;height:28px;margin:2px 0"></div></div>` : ''}
    ` : '';

    const html = `
      <h2 style="font-size:1rem;color:#888;font-weight:500;margin-bottom:16px">${campaign.name}</h2>

      <div class="summary-row">
        <div id="leads-cards" style="display:contents">${leadsPlaceholder}</div>
        <div class="card">
          <div class="label">Descargas totales</div>
          <div class="value">${fmt(totalDownloads || null)}</div>
          <div class="note">${episodes.length} episodio${episodes.length !== 1 ? 's' : ''} en campaña</div>
        </div>
        <div class="card">
          <div class="label">Promedio 7 días</div>
          <div class="value">${avgD7val != null ? fmt(avgD7val) : '—'}</div>
          <div class="note">episodios de esta campaña</div>
        </div>
      </div>

      <div id="optins-chart-container">${
        campaign.kajabiTagId
          ? `<div class="chart-section"><p class="section-title">Opt-ins por día</p><p class="chart-empty" style="color:#555">Cargando…</p></div>`
          : renderChart(null, null, null, campaign)
      }</div>

      <div class="table-section">
        <p class="section-title">Episodios de la campaña</p>
        ${renderEpisodesTable(episodes)}
      </div>`;

    document.getElementById('stats-area').innerHTML = html;
  }

  function renderChart(optinsByDay, optinsTotal, optinsError, campaign) {
    // La gráfica usa contactos con el tag (tienen created_at = fecha de opt-in)
    // Los form_submissions de Kajabi no incluyen fecha en su respuesta API
    if (!campaign.kajabiTagId) {
      return `<div class="chart-section">
        <p class="section-title">Opt-ins por día</p>
        <p class="chart-empty">Asigna una etiqueta de Kajabi a esta campaña para ver los opt-ins.</p>
      </div>`;
    }
    if (!optinsByDay || optinsByDay.length === 0) {
      return `<div class="chart-section">
        <p class="section-title">Opt-ins por día</p>
        <p class="chart-empty">Aún no hay opt-ins registrados.</p>
      </div>`;
    }

    const maxVal = Math.max(...optinsByDay.map(d => d.count), 1);
    const bars = optinsByDay.map(d => {
      const h = Math.max(2, Math.round((d.count / maxVal) * 72));
      return `<div class="chart-bar-col">
        <div class="chart-bar" style="height:${h}px" title="${d.date}: ${d.count} opt-ins"></div>
        <span class="chart-label">${fmtShort(d.date)}</span>
      </div>`;
    }).join('');

    return `<div class="chart-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <p class="section-title" style="margin:0">Opt-ins por día · "${campaign.kajabiTagName}"</p>
        <span style="font-size:.78rem;color:#4ade80;font-weight:600">${fmt(optinsTotal)} total</span>
      </div>
      <div class="chart-wrap">${bars}</div>
    </div>`;
  }

  function renderEpisodesTable(episodes) {
    if (!episodes.length) {
      return `<div class="empty" style="padding:30px">
        No hay episodios asignados a esta campaña.<br>
        <span style="color:#444;font-size:.82rem">Edita la campaña para seleccionarlos.</span>
      </div>`;
    }
    const rows = episodes.map(ep => `
      <tr>
        <td><div class="ep-title">${ep.title || 'Sin título'}</div><div class="ep-date">${fmtDate(ep.pubdate)}</div></td>
        <td class="num">${fmt(ep.downloads1)}</td>
        <td class="num">${fmt(ep.downloads3)}</td>
        <td class="num">${ep.downloads7 != null ? fmt(ep.downloads7) : ep.downloadsAll != null && ep.daysOld < 7 ? fmt(ep.downloadsAll)+`<small style="color:#666;font-size:.72rem"> día ${ep.daysOld}</small>` : '—'}</td>
        <td class="num">${fmt(ep.downloads30)}</td>
        <td class="num">${fmt(ep.downloadsAll)}</td>
        <td>${badge(ep)}</td>
      </tr>`).join('');
    return `<div class="table-wrap"><table>
      <thead><tr>
        <th>Episodio</th>
        <th class="num">1 día</th><th class="num">3 días</th><th class="num">7 días</th>
        <th class="num">30 días</th><th class="num">Total</th><th>vs. promedio</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }

  // ── Modal ─────────────────────────────────────────────────────────────────────
  function openModal(prefill = null) {
    editingId = prefill?.id || null;
    document.getElementById('modal-title').textContent = editingId ? 'Editar campaña' : 'Nueva campaña';
    document.getElementById('f-name').value    = prefill?.name    || '';
    document.getElementById('f-goal').value    = prefill?.leadsGoal != null ? prefill.leadsGoal : '';
    document.getElementById('f-enddate').value = prefill?.endDate || '';

    // Tags dropdown
    const tagSel = document.getElementById('f-tag');
    tagSel.innerHTML = '<option value="">Sin etiqueta</option>' +
      allTags.map(t => `<option value="${t.id}" data-name="${t.name}">${t.name}</option>`).join('');
    if (prefill?.kajabiTagId) tagSel.value = prefill.kajabiTagId;

    // Forms dropdown
    const formSel = document.getElementById('f-form');
    formSel.innerHTML = '<option value="">Sin formulario</option>' +
      allForms.map(f => `<option value="${f.id}" data-name="${f.name}">${f.name}</option>`).join('');
    if (prefill?.kajabiFormId) formSel.value = prefill.kajabiFormId;

    // Episodes checkboxes
    const box = document.getElementById('ep-checkboxes');
    if (allEpisodes.length === 0) {
      box.innerHTML = '<span style="color:#555;font-size:.82rem">No hay episodios disponibles.</span>';
    } else {
      box.innerHTML = allEpisodes.map(ep => {
        const n = parseInt((ep.title || '').match(/#(\d+)/)?.[1] || 0);
        const checked = prefill?.episodeNums?.includes(n) ? 'checked' : '';
        return `<label class="ep-checkbox-item">
          <input type="checkbox" value="${n}" ${checked} />
          ${ep.title}
        </label>`;
      }).join('');
    }

    document.getElementById('modal-overlay').classList.remove('hidden');
  }

  function openEditModal() {
    const c = campaigns.find(c => c.id === currentId);
    if (c) openModal(c);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    editingId = null;
  }

  async function saveCampaign() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Escribe un nombre para la campaña.'); return; }

    const tagSel  = document.getElementById('f-tag');
    const formSel = document.getElementById('f-form');
    const checkedNums = [...document.querySelectorAll('#ep-checkboxes input:checked')]
      .map(el => parseInt(el.value)).filter(Boolean);

    const goalVal   = parseInt(document.getElementById('f-goal').value);
    const endDateVal = document.getElementById('f-enddate').value;

    const payload = {
      name,
      kajabiTagId:    tagSel.value  || null,
      kajabiTagName:  tagSel.value  ? tagSel.options[tagSel.selectedIndex].dataset.name : null,
      kajabiFormId:   formSel.value || null,
      kajabiFormName: formSel.value ? formSel.options[formSel.selectedIndex].dataset.name : null,
      episodeNums:    checkedNums,
      leadsGoal:      isNaN(goalVal) ? null : goalVal,
      endDate:        endDateVal || null
    };

    const url    = editingId ? `/api/campaigns/${editingId}` : '/api/campaigns';
    const method = editingId ? 'PUT' : 'POST';
    const res    = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const data   = await res.json();

    if (data.error) { alert('Error: ' + data.error); return; }

    if (editingId) {
      campaigns = campaigns.map(c => c.id === editingId ? data.campaign : c);
    } else {
      campaigns.push(data.campaign);
    }

    closeModal();
    document.getElementById('campaign-bar').style.display = 'flex';
    document.getElementById('empty-msg')?.remove();
    renderCampaignSelector();
    selectCampaign(data.campaign.id);
  }

  async function deleteCampaign() {
    const c = campaigns.find(c => c.id === currentId);
    if (!c || !confirm(`¿Eliminar la campaña "${c.name}"?`)) return;
    await fetch(`/api/campaigns/${currentId}`, { method: 'DELETE' });
    campaigns = campaigns.filter(c => c.id !== currentId);
    currentId = null;
    renderCampaignSelector();
    document.getElementById('edit-btn').style.display = 'none';
    document.getElementById('delete-btn').style.display = 'none';
    document.getElementById('stats-area').innerHTML =
      campaigns.length === 0
        ? `<div class="empty" id="empty-msg">No hay campañas todavía.<br><span style="color:#444;font-size:.82rem">Crea tu primera campaña con el botón de arriba.</span></div>`
        : `<div class="empty">Selecciona una campaña para ver sus estadísticas.</div>`;
    if (campaigns.length === 0) document.getElementById('campaign-bar').style.display = 'none';
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  init();
</script>
</body>
</html>
