<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algo Más Que Contarte – Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      color: #111;
      overflow-x: hidden;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      text-align: center;
    }
    .show-artwork {
      width: 88px; height: 88px;
      border-radius: 14px;
      object-fit: cover;
      background: #e8e8e8;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    .show-info h1 { font-size: 1.1rem; font-weight: 700; line-height: 1.3; color: #111; }
    .show-info p  { font-size: 0.85rem; color: #777; margin-top: 2px; }

    /* ── Platform buttons ── */
    .platforms {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .platform-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 15px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      transition: transform 0.15s, opacity 0.15s;
    }
    .platform-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .platform-btn:hover { transform: translateY(-1px); opacity: .88; }
    .platform-btn.spotify { background: #1DB954; }
    .platform-btn.apple   { background: #B150E2; }
    .platform-btn.youtube { background: #FF0000; }

    /* ── Sections ── */
    .section { margin-bottom: 28px; }
    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin-bottom: 10px;
    }

    /* ── Latest episode card ── */
    .latest-card {
      background: #f5f5f7;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      border: 1px solid #e8e8e8;
    }
    .latest-card:hover { transform: translateY(-2px); background: #efefef; }
    .latest-card-inner {
      padding: 14px;
      display: flex;
      gap: 13px;
      align-items: flex-start;
    }
    .latest-artwork {
      width: 64px; height: 64px;
      border-radius: 9px;
      object-fit: cover;
      flex-shrink: 0;
      background: #ddd;
    }
    .latest-meta { flex: 1; min-width: 0; }
    .latest-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 3px;
    }
    .latest-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.4;
      color: #111;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .latest-date-dur { font-size: 0.74rem; color: #888; margin-top: 4px; }
    .latest-footer {
      padding: 10px 14px;
      border-top: 1px solid #e8e8e8;
      font-size: 0.74rem;
      color: #999;
      display: flex;
      align-items: center;
    }
    .latest-footer::after { content: '›'; margin-left: auto; font-size: 1rem; color: #ccc; }

    /* ── Episode list ── */
    .episodes-list { display: flex; flex-direction: column; gap: 1px; }
    .episode-item {
      display: flex;
      gap: 11px;
      align-items: center;
      padding: 10px 10px;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.15s;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
      color: inherit;
    }
    .episode-item:hover { background: #f5f5f7; }
    .episode-thumb {
      width: 46px; height: 46px;
      border-radius: 7px;
      object-fit: cover;
      flex-shrink: 0;
      background: #e8e8e8;
    }
    .episode-meta { flex: 1; min-width: 0; }
    .episode-title {
      font-size: 0.84rem;
      font-weight: 500;
      line-height: 1.35;
      color: #111;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .episode-date-dur { font-size: 0.72rem; color: #888; margin-top: 2px; }
    .episode-chevron { color: #ccc; font-size: 1rem; flex-shrink: 0; }

    /* ── Skeleton ── */
    .skeleton { background: #ececec; animation: pulse 1.5s ease-in-out infinite; border-radius: 12px; }
    .skeleton-latest { height: 110px; }
    .skeleton-ep { height: 68px; margin-bottom: 1px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.hidden { display: none; }
    @media (min-width: 480px) { .modal-overlay { align-items: center; } }

    .modal {
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 22px 18px 36px;
      width: 100%;
      max-width: 480px;
      position: relative;
      animation: slideUp .22s ease-out;
      box-shadow: 0 -4px 32px rgba(0,0,0,.12);
    }
    @media (min-width: 480px) { .modal { border-radius: 20px; padding: 24px; margin: 16px; } }
    @keyframes slideUp { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }

    .modal-close {
      position: absolute;
      top: 12px; right: 12px;
      background: #f0f0f0;
      border: none;
      color: #666;
      width: 26px; height: 26px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: #e0e0e0; color: #111; }

    .modal-ep-header {
      display: flex;
      gap: 11px;
      align-items: flex-start;
      margin-bottom: 18px;
      padding-right: 30px;
    }
    .modal-ep-artwork {
      width: 56px; height: 56px;
      border-radius: 9px;
      object-fit: cover;
      flex-shrink: 0;
      background: #ddd;
    }
    .modal-show-label { font-size: 0.68rem; color: #999; margin-bottom: 3px; }
    .modal-ep-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.4;
      color: #111;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .modal-listen-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 9px;
    }
    .modal-platforms { display: flex; flex-direction: column; gap: 8px; }
    .modal-platform-btn {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 12px 15px;
      border-radius: 13px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      transition: opacity 0.15s, transform 0.15s;
    }
    .modal-platform-btn svg { width: 19px; height: 19px; flex-shrink: 0; }
    .modal-platform-btn:hover { opacity: .88; transform: translateY(-1px); }
    .modal-platform-btn.spotify { background: #1DB954; }
    .modal-platform-btn.apple   { background: #B150E2; }
    .modal-platform-btn.youtube { background: #FF0000; }
  </style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <img id="show-artwork" class="show-artwork"
      src="https://is1-ssl.mzstatic.com/image/thumb/Podcasts116/v4/bf/ec/58/bfec583a-abc7-e2ce-98e7-ddad6b2827cc/mza_16516226109485693154.png/600x600bb.jpg"

    <div class="show-info">

      <p>con Alfonso Aguirre</p>

  <!-- Show-level platform links -->
  <div class="platforms">

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 3.5a3.5 3.5 0 0 1 3.5 3.5c0 1.33-.744 2.484-1.836 3.086A5.51 5.51 0 0 1 15 14.5c0 .276-.224.5-.5.5h-5a.5.5 0 0 1-.5-.5 5.51 5.51 0 0 1 1.336-3.414A3.497 3.497 0 0 1 8.5 9 3.5 3.5 0 0 1 12 5.5zm0 9.5a.5.5 0 1 0 0 1 .5.5 0 0 0 0-1z"/></svg>

      YouTube Music
    </a>
  </div>

  <!-- Latest episode -->
  <section class="section">
    <h2 class="section-title">Episodio más reciente</h2>
    <div id="latest-episode">
      <div class="skeleton skeleton-latest"></div>
    </div>
  </section>

  <!-- Episodes list -->
  <section class="section">
    <h2 class="section-title">Episodios</h2>
    <div id="episodes-list">
      <div class="skeleton skeleton-ep"></div>
      <div class="skeleton skeleton-ep"></div>
      <div class="skeleton skeleton-ep"></div>
    </div>
    <div id="scroll-sentinel" style="height:1px;margin-top:8px;"></div>
  </section>

</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
    <div class="modal-ep-header">
      <img id="modal-artwork" class="modal-ep-artwork" src="" alt="" />
      <div>
        <p class="modal-show-label">Algo Más Que Contarte con Alfonso Aguirre</p>
        <p id="modal-title" class="modal-ep-title"></p>
      </div>
    </div>
    <p class="modal-listen-label">Escuchar en</p>
    <div class="modal-platforms">
      <a id="modal-spotify" href="#" target="_blank" rel="noopener" class="modal-platform-btn spotify">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Spotify
      </a>
      <a id="modal-apple" href="#" target="_blank" rel="noopener" class="modal-platform-btn apple">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 3.5a3.5 3.5 0 0 1 3.5 3.5c0 1.33-.744 2.484-1.836 3.086A5.51 5.51 0 0 1 15 14.5c0 .276-.224.5-.5.5h-5a.5.5 0 0 1-.5-.5 5.51 5.51 0 0 1 1.336-3.414A3.497 3.497 0 0 1 8.5 9 3.5 3.5 0 0 1 12 5.5zm0 9.5a.5.5 0 1 0 0 1 .5.5 0 0 0 0-1z"/></svg>
        Apple Podcasts
      </a>
      <a id="modal-youtube" href="#" target="_blank" rel="noopener" class="modal-platform-btn youtube">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        YouTube Music
      </a>
    </div>
  </div>
</div>

<script>
  const SPOTIFY_SHOW = 'https://open.spotify.com/show/2YNRodcHc7nTjqVUzMRDB4';
  const APPLE_SHOW   = 'https://podcasts.apple.com/us/podcast/algo-m%C3%A1s-que-contarte-con-alfonso-aguirre/id1493350313?l=es-MX';
  const YOUTUBE_LIST = 'https://www.youtube.com/playlist?list=PLcjbYuEvmLRm3Ff2fvpnsq9MkREPV0zdt';

  function fmtDuration(ms) {
    if (!ms) return '';
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return h > 0 ? `${h} hr ${m} min` : `${m} min`;
  }

  function fmtDate(str) {
    return new Date(str).toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function notifyResize() {
    const h = document.body.scrollHeight;
    window.parent.postMessage({ type: 'podcast-embed-resize', height: h }, '*');
  }

  function openModal(ep) {
    document.getElementById('modal-artwork').src = ep.artworkUrl600 || ep.artworkUrl160 || '';
    document.getElementById('modal-title').textContent = ep.trackName || '';
    document.getElementById('modal-apple').href   = ep.trackViewUrl || APPLE_SHOW;
    document.getElementById('modal-spotify').href = ep.spotifyUrl   || SPOTIFY_SHOW;
    document.getElementById('modal-youtube').href = ep.youtubeUrl   || YOUTUBE_LIST;
    document.getElementById('modal-overlay').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function renderLatest(ep) {
    const el = document.getElementById('latest-episode');
    el.innerHTML = `
      <div class="latest-card">
        <div class="latest-card-inner">
          <img class="latest-artwork" src="${ep.artworkUrl600 || ep.artworkUrl160 || ''}" alt="" />
          <div class="latest-meta">
            <div class="latest-label">Nuevo episodio</div>
            <div class="latest-title">${ep.trackName}</div>
            <div class="latest-date-dur">${fmtDate(ep.releaseDate)} · ${fmtDuration(ep.trackTimeMillis)}</div>
          </div>
        </div>
        <div class="latest-footer">Escuchar en tu plataforma favorita</div>
      </div>`;
    el.querySelector('.latest-card').addEventListener('click', () => openModal(ep));
    notifyResize();
  }

  const PAGE_SIZE = 6;
  let currentOffset = 1;
  let isLoading = false;
  let noMore = false;

  function appendEpisodes(eps) {
    const list = document.getElementById('episodes-list');
    eps.forEach(ep => {
      const btn = document.createElement('button');
      btn.className = 'episode-item';
      btn.innerHTML = `
        <img class="episode-thumb" src="${ep.artworkUrl600 || ep.artworkUrl160 || ''}" alt="" />
        <div class="episode-meta">
          <div class="episode-title">${ep.trackName}</div>
          <div class="episode-date-dur">${fmtDate(ep.releaseDate)} · ${fmtDuration(ep.trackTimeMillis)}</div>
        </div>
        <span class="episode-chevron">›</span>`;
      btn.addEventListener('click', () => openModal(ep));
      list.appendChild(btn);
    });
    notifyResize();
  }

  function showSkeletons() {
    const list = document.getElementById('episodes-list');
    for (let i = 0; i < 3; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton skeleton-ep loading-skeleton';
      sk.style.marginBottom = '1px';
      list.appendChild(sk);
    }
  }

  function removeSkeletons() {
    document.querySelectorAll('.loading-skeleton').forEach(el => el.remove());
  }

  async function loadMore() {
    if (isLoading || noMore) return;
    isLoading = true;
    showSkeletons();
    try {
      const res  = await fetch(`/api/episodes?offset=${currentOffset}&limit=${PAGE_SIZE}`);
      const data = await res.json();
      removeSkeletons();
      const eps = data.episodes || [];
      if (eps.length) {
        appendEpisodes(eps);
        currentOffset += eps.length;
      }
      if (!data.hasMore) {
        noMore = true;
        document.getElementById('scroll-sentinel').style.display = 'none';
      }
    } catch (e) {
      removeSkeletons();
    }
    isLoading = false;
  }

  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMore();
  }, { rootMargin: '400px' });
  observer.observe(document.getElementById('scroll-sentinel'));

  window.addEventListener('scroll', () => {
    if (isLoading || noMore) return;
    const sentinel = document.getElementById('scroll-sentinel');
    if (!sentinel) return;
    const rect = sentinel.getBoundingClientRect();
    if (rect.top <= window.innerHeight + 400) loadMore();
  }, { passive: true });

  async function load() {
    try {
      const firstRes  = await fetch('/api/episodes?offset=0&limit=1');
      const firstData = await firstRes.json();

      if (firstData.show) {
        const art = firstData.show.artworkUrl600 || firstData.show.artworkUrl100 || '';
        if (art) document.getElementById('show-artwork').src = art;
        document.getElementById('show-name').textContent =
          firstData.show.collectionName || firstData.show.trackName || 'Algo Más Que Contarte';
      }

      if (firstData.episodes && firstData.episodes[0]) {
        renderLatest(firstData.episodes[0]);
      }

      document.getElementById('episodes-list').innerHTML = '';
      await loadMore();

    } catch (e) {
      document.getElementById('episodes-list').innerHTML =
        '<p style="padding:16px;color:#aaa;text-align:center">No se pudieron cargar los episodios.</p>';
    }
  }

  load();
</script>
</body>
</html>
